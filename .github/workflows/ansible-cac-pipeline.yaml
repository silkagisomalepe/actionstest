name: Ansible SSM Deploy

on:
  push:
    branches: [main]
    paths:
      - ansible/playbooks/**
      - ansible/roles/**
      - ansible/requirements.yml
  pull_request:
    branches: [main]
    paths:
      - ansible/playbooks/**
      - ansible/roles/**
      - ansible/requirements.yml
  workflow_dispatch:
    inputs:
      environment:
        description: Environment
        required: true
        type: choice
        options: [dev, prod]
      action:
        description: Action
        required: true
        type: choice
        options: [check, deploy]
        default: check

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Ansible lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible
    env:
      ANSIBLE_ROLES_PATH: ${{ github.workspace }}/ansible/roles
    steps:
      - uses: actions/checkout@v6

      - name: Format check
        run: |
          pip install yamllint
          yamllint playbooks/ roles/

      - name: Run ansible-lint
        uses: ansible/ansible-lint@v26.6.0
        with:
          targets: |
            ansible/playbooks/
            ansible/roles/

      - name: Syntax check
        run: ansible-playbook playbooks/site.yml --syntax-check

  scan:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Vulnerability Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          output: trivy-results.txt
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "1"

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: |
            trivy-results.txt

  manual-approval:
    name: Manual Approval
    runs-on: ubuntu-latest
    needs: [lint, scan]
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'deploy'

    permissions:
      issues: write

    steps:
      - name: Await Manual Approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: silkagisomalepe
          minimum-approvals: 1
          issue-title: "Manual Approval Required for Ansible Deploy"
          issue-body: "Please approve or deny the deployment."

  deploy:
    name: Deploy / ${{ matrix.environment }}
    needs: [lint, scan, manual-approval]
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'deploy'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ${{ fromJson(format('["{0}"]', inputs.environment)) }}
      fail-fast: false
      max-parallel: 1
    environment: ${{ matrix.environment }}
    env:
      AWS_OIDC_IAM_ROLE: ${{ matrix.environment == 'prod' && secrets.PROD_AWS_OIDC_IAM_ROLE || secrets.DEV_AWS_OIDC_IAM_ROLE }}
      AWS_OIDC_REGION: ${{ matrix.environment == 'prod' && secrets.PROD_AWS_OIDC_REGION || secrets.DEV_AWS_OIDC_REGION }}
      AWS_OIDC_ARTIFACT_BUCKET: ${{ matrix.environment == 'prod' && secrets.PROD_AWS_OIDC_ARTIFACT_BUCKET || secrets.DEV_AWS_OIDC_ARTIFACT_BUCKET }}
      AWS_OIDC_HEALTH_URL: ${{ matrix.environment == 'prod' && secrets.PROD_AWS_OIDC_HEALTH_URL || secrets.DEV_AWS_OIDC_HEALTH_URL }}
    defaults:
      run:
        working-directory: ansible

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_IAM_ROLE }}
          aws-region: ${{ env.AWS_OIDC_REGION }}

      - name: Package playbook
        run: zip -r ansible-deploy.zip playbooks/ roles/ requirements.yml ansible.cfg

      - name: Upload artifact
        run: |
          aws s3 cp ansible-deploy.zip s3://${{ env.AWS_OIDC_ARTIFACT_BUCKET }}/${{ matrix.environment }}/ansible-deploy-${{ github.sha }}.zip
          aws s3 cp ansible-deploy.zip s3://rewards-ansible-artifacts/dev/ansible-deploy.zip

      - name: Run playbook (SSM)
        run: |
          CHECK="${{ github.event_name == 'workflow_dispatch' && inputs.action == 'check' && 'True' || 'False' }}"
          PARAMS=$(jq -n \
            --arg path "https://s3.${{ env.AWS_OIDC_REGION }}.amazonaws.com/${{ env.AWS_OIDC_ARTIFACT_BUCKET }}/${{ matrix.environment }}/ansible-deploy-${{ github.sha }}.zip" \
            --arg check "$CHECK" \
            --arg env "${{ matrix.environment }}" \
            '{
              SourceType: ["S3"],
              SourceInfo: [({path: $path} | tojson)],
              InstallDependencies: ["True"],
              PlaybookFile: ["playbooks/site.yml"],
              ExtraVariables: [("env=" + $env)],
              Check: [$check]
            }')
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-ApplyAnsiblePlaybooks" \
            --targets "Key=tag:Environment,Values=${{ matrix.environment }}" "Key=tag:Service,Values=rewards" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" --output text)
          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

      - name: Wait for completion
        run: |
          for i in $(seq 1 30); do
            STATUSES=$(aws ssm list-command-invocations --command-id "$COMMAND_ID" --query "CommandInvocations[].Status" --output text)
            echo "$STATUSES" | grep -qiE "Pending|InProgress|Delayed" || break
            sleep 10
          done
          echo "$STATUSES"
          echo "$STATUSES" | grep -qiE "Failed|TimedOut|Cancelled" && exit 1 || true

      - name: Smoke test
        if: github.event_name != 'workflow_dispatch' || inputs.action == 'deploy'
        run: |
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.AWS_OIDC_HEALTH_URL }}")
            echo "$STATUS"
            [ "$STATUS" -eq 200 ] && exit 0
            sleep 10
          done
          exit 1