name: TEST Login
on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: "eu-west-1"     
permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: arn:aws:iam::773552202210:role/my-github-actions-role-test
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: CLI Login
      id: build-image
      run: |
        aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin 773552202210.dkr.ecr.eu-west-1.amazonaws.com




